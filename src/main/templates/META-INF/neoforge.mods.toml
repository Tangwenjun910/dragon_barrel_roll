modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="Tangwenjun"
logoFile ="${mod_id}.png"
description='''
Dragon Barrel Roll adds barrel roll mechanics to Dragon Survival flight.

Fly like a fighter jet — pitch, yaw, and roll freely in the air with full 6-DOF camera control. Features momentum-based mouse steering, keyboard flight controls, customizable banking effects, and optional horizon/momentum HUD widgets. Synchronizes roll/pitch/yaw to the dragon model for other players in multiplayer.

Optional server-side: clients can join servers without this mod, only losing sync visuals.

为龙之生存的飞行添加桶滚机制，像战斗机一样自由俯仰、偏航、滚转。
'''
[[mixins]]
    config="${mod_id}.mixins.json"

# Start of user code block mod configuration
# End of user code block mod configuration

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="dragonsurvival"
    type="required"
    versionRange="[2.0.45,)"
    mandatory=true
    ordering="BEFORE"
    side="BOTH"

